name: Community Monitor

on:
  schedule:
    - cron: '0 10 * * 1'  # Weekly on Monday 10:00 UTC, 1h after native changelog monitor
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  monitor:
    name: Check community sources for new CC content
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run community monitor
        id: monitor
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          set +e
          python .github/scripts/community-monitor.py \
            --community-docs-dir docs/community/ \
            --state-file .github/state/community-monitor-state.json \
            > /tmp/report.md 2>/tmp/monitor-stderr.txt
          EXIT_CODE=$?
          set -e

          cat /tmp/monitor-stderr.txt >&2

          if [ $EXIT_CODE -eq 1 ]; then
            echo "new_content=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_content=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create triage PR
        if: steps.monitor.outputs.new_content == 'true'
        uses: ./.github/actions/create-triage-pr
        with:
          branch-prefix: chore/community-triage
          report-dest: docs/community/community-triage
          extra-files: .github/state/community-monitor-state.json
          pr-title-prefix: 'chore: community triage'
          pr-body-header: 'Community Monitor: New Uncovered Content Detected'
          pr-body-note: 'Auto-generated by community-monitor. Review, update community docs, then merge.'
