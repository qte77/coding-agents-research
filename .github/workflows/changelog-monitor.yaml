name: Changelog Monitor

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    name: Check for new CC changelog entries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch CC CHANGELOG.md
        run: |
          curl -sSfL \
            "https://raw.githubusercontent.com/anthropics/claude-code/main/CHANGELOG.md" \
            -o /tmp/CC-CHANGELOG.md
          echo "Downloaded $(wc -l < /tmp/CC-CHANGELOG.md) lines"

      - name: Run comparison script
        id: compare
        run: |
          set +e
          python .github/scripts/changelog-compare.py \
            --changelog /tmp/CC-CHANGELOG.md \
            --scan-doc docs/CC-changelog-feature-scan.md \
            --docs-dir docs/ \
            > /tmp/report.md 2>/tmp/compare-stderr.txt
          EXIT_CODE=$?
          set -e

          cat /tmp/compare-stderr.txt >&2

          if [ $EXIT_CODE -eq 1 ]; then
            echo "new_features=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_features=false" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "# CC Changelog: New Uncovered Features Detected"
            echo ""
            echo "_Auto-generated by changelog-monitor. Review and update docs/CC-changelog-feature-scan.md._"
            echo ""
            cat /tmp/report.md
          } > /tmp/issue-body.md

      - name: Create issue for uncovered features
        if: steps.compare.outputs.new_features == 'true'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "chore: new CC changelog entries need triage"
          content-filepath: /tmp/issue-body.md
          labels: changelog-scan
