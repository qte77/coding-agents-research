name: Changelog Monitor

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly on Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  monitor:
    name: Check for new CC changelog entries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch CC CHANGELOG.md
        run: |
          curl -sSfL \
            "https://raw.githubusercontent.com/anthropics/claude-code/main/CHANGELOG.md" \
            -o /tmp/CC-CHANGELOG.md
          echo "Downloaded $(wc -l < /tmp/CC-CHANGELOG.md) lines"

      - name: Run comparison script
        id: compare
        run: |
          set +e
          python .github/scripts/changelog-compare.py \
            --changelog /tmp/CC-CHANGELOG.md \
            --scan-doc docs/cc-native/CC-changelog-feature-scan.md \
            --docs-dir docs/cc-native/ \
            --update-scan-doc \
            > /tmp/report.md 2>/tmp/compare-stderr.txt
          EXIT_CODE=$?
          set -e

          cat /tmp/compare-stderr.txt >&2

          if [ $EXIT_CODE -eq 1 ]; then
            echo "new_features=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_features=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run native sources monitor
        id: native_monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          python .github/scripts/native-sources-monitor.py \
            --native-docs-dir docs/cc-native/ \
            --state-file .github/state/native-monitor-state.json \
            >> /tmp/report.md 2>/tmp/native-stderr.txt
          NATIVE_EXIT=$?
          set -e

          cat /tmp/native-stderr.txt >&2

          if [ $NATIVE_EXIT -eq 1 ]; then
            echo "new_native=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_native=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create triage PR
        if: steps.compare.outputs.new_features == 'true' || steps.native_monitor.outputs.new_native == 'true'
        uses: ./.github/actions/create-triage-pr
        with:
          branch-prefix: chore/changelog-triage
          report-dest: triage/cc-changelog/changelog-triage
          extra-files: >-
            docs/cc-native/CC-changelog-feature-scan.md
            .github/state/native-monitor-state.json
          pr-title-prefix: 'chore: changelog triage'
          pr-body-header: 'CC Changelog & Native Sources: New Uncovered Features Detected'
          pr-body-note: 'Auto-generated by changelog-monitor + native-sources-monitor. Review, update docs, then merge.'
