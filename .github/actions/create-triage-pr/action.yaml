name: Create Triage PR
description: Create a branch with a triage report and open a PR

inputs:
  branch-prefix:
    description: 'Branch name prefix (e.g., chore/changelog-triage)'
    required: true
  report-dest:
    description: 'Destination path for the report file (e.g., docs/cc-native/changelog-triage)'
    required: true
  extra-files:
    description: 'Space-separated extra files to stage'
    required: false
    default: ''
  pr-title-prefix:
    description: 'PR title prefix (e.g., chore: changelog triage)'
    required: true
  pr-body-header:
    description: 'Header line for PR body'
    required: true
  pr-body-note:
    description: 'Note line below header'
    required: true

runs:
  using: composite
  steps:
    - name: Create branch, commit, and open PR
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        DATE_STAMP=$(date -u +%Y-%m-%d)
        BRANCH="${{ inputs.branch-prefix }}-${DATE_STAMP}"

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git checkout -b "$BRANCH"

        cp /tmp/report.md "${{ inputs.report-dest }}-${DATE_STAMP}.md"

        git add "${{ inputs.report-dest }}-${DATE_STAMP}.md"
        for f in ${{ inputs.extra-files }}; do
          git add "$f"
        done

        git commit -m "${{ inputs.pr-title-prefix }} ${DATE_STAMP}

        Auto-generated by monitor workflow."

        git push origin "$BRANCH"

        {
          echo "## ${{ inputs.pr-body-header }}"
          echo ""
          echo "_${{ inputs.pr-body-note }}_"
          echo ""
          cat /tmp/report.md
        } > /tmp/pr-body.md

        gh pr create \
          --base main \
          --head "$BRANCH" \
          --title "${{ inputs.pr-title-prefix }} ${DATE_STAMP}" \
          --body-file /tmp/pr-body.md
